name: Update broker_analysis.xlsx file

on:
  schedule:
    - cron: '45 10 * * *'  # 10:45 AM UTC Sunday to Friday (4:30 PM NPT)
    - cron: '00 11 * * *'  # 11:00 AM UTC (4:45 PM NPT)
    - cron: '15 11 * * *'  # 11:15 AM UTC (5:00 PM NPT)
    - cron: '45 13 * * *'  # 1:45 PM UTC (7:30 PM NPT)
    - cron: '00 14 * * *'  # 2:00 PM UTC (8:00 PM NPT)
    
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
            npx puppeteer install chrome
          fi

      - name: Install Chromium for Actions
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Debug Puppeteer browser path
        run: |
          node -e "const fs=require('fs'); const p=require('puppeteer'); const path=p.executablePath(); console.log('puppeteer executablePath:', path); console.log('exists:', fs.existsSync(path)); console.log('chromium-browser exists:', fs.existsSync('/usr/bin/chromium-browser')); console.log('chromium exists:', fs.existsSync('/usr/bin/chromium')); console.log('google-chrome exists:', fs.existsSync('/usr/bin/google-chrome'));"

      - name: Run broker_nepse_alpha.js
        run: node broker_nepse_alpha.js

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Commit and push changes
        run: |
          # Check if Broker_Analysis.xlsx changed in the working tree or staged area
          if git diff --quiet HEAD -- Broker_Analysis.xlsx; then
            echo "Broker_Analysis.xlsx has NOT changed. Skipping commit."
          else
            echo "Broker_Analysis.xlsx changed. Committing all changes."
            git add -A
            git commit -m "📝 Update files including Broker_Analysis.xlsx [automated]"
            git push origin HEAD:main
          fi
      
